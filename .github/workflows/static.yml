# GitHub Pages serves static files only (no Python/Flask at runtime).
# The full repo stays on GitHub as open source; this job publishes HTML for the tutorial site.
# Optional: run `python wsgi.py` locally to preview with Flask.
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build static site bundle
        run: |
          mkdir -p _site/app/pages _site/app/onnx_models
          cp index.html _site/
          cp 404.html _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp app/pages/*.html _site/app/pages/
          find app/onnx_models -maxdepth 1 -name '*.onnx' -print0 | xargs -0 -r cp -t _site/app/onnx_models/
          cp .nojekyll _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
