<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=supervised_learning.html">
  <title>Machine Learning - Python to AI</title>
</head>
<body>
  <p>Redirecting to <a href="supervised_learning.html">Supervised Learning</a>…</p>
        <script>
    (function () {
        var sections = Array.from(document.querySelectorAll("section[id]"));
        var links    = Array.from(document.querySelectorAll(".sidebar-link[href^='#']"));
        if (!sections.length || !links.length) return;
        function update() {
            var threshold = window.innerHeight * 0.3;
            var active = sections[0];
            for (var i = 0; i < sections.length; i++) {
                if (sections[i].getBoundingClientRect().top <= threshold) {
                    active = sections[i];
                }
            }
            links.forEach(function (a) {
                a.classList.toggle("active", a.getAttribute("href") === "#" + active.id);
            });
        }
        window.addEventListener("scroll", update, { passive: true });
        update();
    })();
    </script>
</body>
</html>
